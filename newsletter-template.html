<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--META-->
<title>Newsletter Fedaiisf</title>
<link rel="icon" type="image/png" href="assets/logo-fedaiisf.png" />
<link rel="apple-touch-icon" href="assets/logo-fedaiisf.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --brand: #0B4FA0;
    --brand-deep: #073973;
    --brand-soft: #E8EFF9;
    --accent-red: #B7202E;
    --accent-green: #1B7A4C;
    --accent-purple: #8B1F2C;
    --ink: #1A1B1F;
    --ink-2: #3A3D44;
    --ink-3: #6B6F78;
    --line: #E2DDCD;
    --paper: #F4ECD8;
    --paper-2: #EBE2C9;
    --white: #FFFFFF;
    --r-sm: 10px; --r-md: 16px; --r-lg: 24px; --r-xl: 32px; --r-pill: 999px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: #DCCFAF;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Page */
  .page {
    max-width: 720px; margin: 32px auto;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    overflow: hidden;
    box-shadow: 0 24px 60px -30px rgba(11,79,160,0.18);
  }

  /* Toolbar */
  .toolbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(251,250,246,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; gap: 12px;
    font-size: 12.5px; color: var(--ink-3);
  }
  .toolbar .meta { display: flex; align-items: center; gap: 10px; font-weight: 500; }
  .toolbar .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--accent-green); display: inline-block; box-shadow: 0 0 0 3px rgba(27,122,76,0.15); }
  .toolbar .actions { display: flex; gap: 6px; align-items: center; }

  .btn {
    appearance: none; border: 1px solid var(--ink); background: var(--ink); color: var(--paper);
    padding: 9px 14px; border-radius: var(--r-pill);
    font: 500 12.5px/1 'Inter', sans-serif;
    cursor: pointer; transition: all .15s ease;
    display: inline-flex; align-items: center; gap: 7px; text-decoration: none;
  }
  .btn:hover { background: var(--brand); border-color: var(--brand); }
  .btn.ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn.ghost:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn .ico { width: 14px; height: 14px; }

  /* Masthead */
  .masthead { padding: 40px 48px 26px; }
  .masthead-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .mast-logo a { display: inline-block; line-height: 0; }
  .mast-logo img { height: 32px; width: auto; display: block; }
  .mast-issue { text-align: right; font-size: 12px; color: var(--ink-3); line-height: 1.6; }
  .mast-issue strong { color: var(--ink); font-weight: 500; }

  .mast-title {
    margin: 32px 0 10px;
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 52px;
    line-height: 0.98;
    letter-spacing: -0.022em;
    color: var(--ink);
    text-wrap: balance;
  }
  .mast-title em { font-style: normal; color: var(--ink); font-weight: 400; }
  .mast-sub {
    margin-top: 14px;
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.55;
    max-width: 52ch;
  }

  .rule { height: 1px; background: var(--line); margin: 0 48px; }
  .rule.tri {
    height: 4px;
    background: linear-gradient(to right,
      var(--accent-green) 0 33.33%,
      #FFFFFF 33.33% 66.66%,
      var(--accent-red) 66.66% 100%);
    margin: 0 48px;
  }
  .rule.red {
    height: 4px;
    background: var(--accent-red);
    margin: 0 48px;
  }
  .rule.tri span { display: none; }

  /* Section */
  .sec-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 36px 48px 16px; gap: 16px;
  }
  .sec-kicker {
    font-size: 12px; color: var(--brand); font-weight: 500;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .sec-kicker::before {
    content: ""; width: 18px; height: 1px; background: var(--brand);
  }
  .sec-title {
    font-family: 'Fraunces', serif;
    font-size: 22px; line-height: 1.15;
    color: var(--ink); margin: 6px 0 0;
    font-weight: 500; letter-spacing: -0.01em;
  }
  .sec-count { font-size: 12px; color: var(--ink-3); }

  /* Hero */
  .hero { padding: 0 48px 36px; }
  .hero .label {
    display: inline-block;
    background: var(--brand-soft); color: var(--brand-deep);
    padding: 6px 12px; border-radius: var(--r-pill);
    font: 500 11.5px/1 'Inter', sans-serif;
    margin-bottom: 18px;
  }
  .hero h2 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 36px; line-height: 1.06;
    letter-spacing: -0.018em;
    margin: 0 0 16px; color: var(--ink);
    text-wrap: balance;
  }
  .hero h2 a {
    color: inherit; text-decoration: none;
    background-image: linear-gradient(var(--brand), var(--brand));
    background-size: 0 1px; background-repeat: no-repeat; background-position: 0 100%;
    transition: background-size .25s ease;
  }
  .hero h2 a:hover { background-size: 100% 1px; }
  .hero .deck {
    font-size: 15.5px; line-height: 1.65; color: var(--ink-2);
    margin: 0 0 18px; max-width: 58ch;
  }
  .hero .deck::first-letter {
    font-family: 'Fraunces', serif;
    font-size: 48px; line-height: 0.85; float: left;
    margin: 4px 8px 0 0; color: var(--brand); font-weight: 400;
  }
  .hero .meta-row {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 12.5px; color: var(--ink-3);
    margin-top: 12px;
  }
  .hero .meta-row .read {
    color: var(--brand); text-decoration: none; font-weight: 500;
    border-bottom: 1px solid var(--brand); padding-bottom: 2px;
  }
  .hero .meta-row .read:hover { color: var(--brand-deep); border-color: var(--brand-deep); }
  .hero .meta-row .sep { color: var(--line); }

  .hero .visual {
    margin-bottom: 26px;
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    aspect-ratio: 16/9;
    background: repeating-linear-gradient(45deg,
      rgba(11,79,160,0.06) 0 8px,
      rgba(11,79,160,0.02) 8px 16px);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero .visual img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero .visual::before {
    content: ""; position: absolute; inset: 14px;
    border: 1px dashed rgba(11,79,160,0.25);
    border-radius: calc(var(--r-lg) - 8px);
    pointer-events: none;
  }
  .hero .visual:has(img)::before { display: none; }
  .hero .visual .v-label {
    font-size: 12px; color: var(--brand);
    background: var(--paper);
    padding: 7px 14px;
    border: 1px solid rgba(11,79,160,0.25);
    border-radius: var(--r-pill);
    z-index: 1;
  }

  /* Articles list */
  .grid { padding: 12px 48px 28px; display: flex; flex-direction: column; gap: 0; }
  .article-card {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 22px;
    padding: 22px;
    background: #FFFAEB;
    border: 1px solid rgba(139,31,44,0.10);
    border-radius: 18px;
    text-decoration: none; color: inherit;
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    position: relative;
    align-items: stretch;
  }
  .article-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 32px -18px rgba(91,26,42,0.28);
    border-color: rgba(139,31,44,0.28);
  }
  .article-card.no-image { grid-template-columns: 1fr; }

  .article-image {
    width: 150px; aspect-ratio: 4/3;
    border-radius: 12px;
    overflow: hidden;
    background: var(--paper);
    border: 1px solid rgba(0,0,0,0.04);
  }
  .article-image img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  .article-content { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
  .article-meta-top {
    display: flex; align-items: center; gap: 14px;
    flex-wrap: wrap;
  }
  .article-meta-top .num {
    font-size: 10.5px; color: var(--ink-3);
    font-weight: 600; letter-spacing: 0.12em;
  }

  .cat-tag {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 0; background: none;
    font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-2);
    white-space: nowrap;
  }
  .cat-tag::before {
    content: ""; display: inline-block;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--brand);
    flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(11,79,160,0.10);
  }
  .cat-tag.red::before { background: var(--accent-red); box-shadow: 0 0 0 3px rgba(183,32,46,0.10); }
  .cat-tag.green::before { background: var(--accent-green); box-shadow: 0 0 0 3px rgba(27,122,76,0.10); }
  .cat-tag.blue::before { background: var(--brand); box-shadow: 0 0 0 3px rgba(11,79,160,0.10); }

  .article-title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 19px; line-height: 1.22;
    letter-spacing: -0.01em;
    margin: 0; color: var(--ink);
    text-wrap: balance;
    transition: color .2s ease;
  }
  .article-card:hover .article-title { color: var(--brand); }
  .article-summary {
    margin: 0; font-size: 14px; line-height: 1.55;
    color: var(--ink-2);
    text-wrap: pretty;
  }
  .article-content .meta-line {
    margin-top: 4px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    font-size: 12px; color: var(--ink-3);
  }
  .article-content .meta-line .sep { color: var(--line); }
  .article-content .meta-line .arrow-inline {
    margin-left: auto;
    display: inline-flex; align-items: center;
    color: var(--accent-red);
    transition: transform .25s ease;
  }
  .article-card:hover .arrow-inline { transform: translateX(4px); }

  .divider-red {
    width: 80px; height: 4px;
    background: var(--accent-red);
    border-radius: 999px;
    margin: 18px auto;
    flex-shrink: 0;
  }

  @media (max-width: 640px) {
    .article-card { grid-template-columns: 1fr; gap: 14px; padding: 18px; }
    .article-image { width: 100%; aspect-ratio: 16/9; }
  }

  /* Pull quote */
  .pull {
    margin: 14px 48px 36px;
    padding: 40px 44px;
    background: var(--brand);
    color: #fff;
    border-radius: var(--r-lg);
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; gap: 36px;
  }
  .pull-quote { flex: 1; min-width: 0; position: relative; z-index: 2; }
  .pull blockquote {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 24px; line-height: 1.28;
    margin: 0 0 14px; letter-spacing: -0.01em;
    text-wrap: balance;
  }
  .pull cite {
    display: block; font-style: normal;
    font-size: 12.5px; opacity: 0.85;
  }
  .pull-logo {
    position: relative;
    width: 160px; height: 160px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .pull-logo img {
    position: relative;
    z-index: 3;
    width: 88px; height: 88px;
    border-radius: 50%;
    background: #fff;
    padding: 6px;
    object-fit: contain;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    animation: logo-breathe 7s ease-in-out infinite;
  }
  .pull-logo .ping {
    position: absolute;
    left: 50%; top: 50%;
    width: 88px; height: 88px;
    margin: -44px 0 0 -44px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.55);
    animation: pull-ping 5.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    pointer-events: none;
    will-change: transform, opacity;
  }
  .pull-logo .ping:nth-of-type(2) { animation-delay: 1.8s; border-color: rgba(255,255,255,0.4); }
  .pull-logo .ping:nth-of-type(3) { animation-delay: 3.6s; border-color: rgba(255,255,255,0.28); }
  @keyframes pull-ping {
    0%   { transform: scale(1);    opacity: 0;    }
    18%  {                         opacity: 0.55; }
    55%  {                         opacity: 0.18; }
    100% { transform: scale(2.4);  opacity: 0;    }
  }
  @keyframes logo-breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.045); }
  }
  @media (prefers-reduced-motion: reduce) {
    .pull-logo .ping { animation: none; opacity: 0.32; }
    .pull-logo img { animation: none; }
  }
  @media (max-width: 640px) {
    .pull { flex-direction: column; gap: 24px; padding: 32px 28px; }
    .pull-logo { width: 130px; height: 130px; }
    .pull-logo img { width: 72px; height: 72px; }
    .pull-logo .ping { width: 72px; height: 72px; margin: -36px 0 0 -36px; }
  }

  /* Footer */
  .footer {
    padding: 36px 48px 32px;
    border-top: 1px solid var(--line);
    background: var(--paper-2);
  }
  .footer-grid {
    display: grid; grid-template-columns: 1.6fr 1fr 1fr 1.4fr; gap: 28px;
    font-size: 13px; color: var(--ink-2); line-height: 1.6;
  }
  .footer-grid:has(> div:nth-child(4)) { grid-template-columns: 1.6fr 1fr 1fr 1.4fr; }
  .footer-grid:not(:has(> div:nth-child(4))) { grid-template-columns: 2fr 1fr 1fr; }
  .comitato-group + .comitato-group { margin-top: 14px; }
  .comitato-group .c-label {
    font-size: 10px; color: var(--ink-3);
    letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 600; margin-bottom: 6px;
  }
  .comitato-list { font-size: 12.5px; }
  .comitato-list li { color: var(--ink); margin-bottom: 3px; line-height: 1.4; }
  .footer-grid h5 {
    font-size: 11px; color: var(--ink);
    margin: 0 0 12px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
  }
  .footer-grid p { margin: 0; color: var(--ink); }
  .footer-grid ul { margin: 0; padding: 0; list-style: none; }
  .footer-grid li { margin-bottom: 6px; }
  .footer-grid a {
    color: var(--ink); text-decoration: none; font-weight: 500;
    border-bottom: 1px solid currentColor;
    padding-bottom: 1px;
    opacity: 0.65;
    transition: opacity .15s ease, color .15s ease;
  }
  .footer-grid a:hover { opacity: 1; color: var(--brand); }

  .colophon {
    margin-top: 28px; padding-top: 18px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    font-size: 11.5px; color: var(--ink);
  }
  .colophon .socials { display: flex; gap: 14px; }
  .colophon .socials a {
    color: var(--ink); text-decoration: none;
    font-weight: 600;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 1px;
    transition: color .15s ease, border-color .15s ease;
  }
  .colophon .socials a:hover { color: var(--brand); border-color: var(--brand); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--paper);
    padding: 13px 20px; border-radius: var(--r-pill);
    font: 500 13px/1 'Inter', sans-serif;
    box-shadow: 0 12px 30px -10px rgba(0,0,0,0.35);
    opacity: 0; pointer-events: none;
    transition: opacity .2s ease, transform .25s ease;
    z-index: 100;
    display: flex; align-items: center; gap: 9px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .check { width: 14px; height: 14px; color: #6FE2A2; }

  /* Modal */
  .modal-back {
    position: fixed; inset: 0;
    background: rgba(20,22,28,0.55);
    display: none; align-items: center; justify-content: center;
    z-index: 200; padding: 24px;
    backdrop-filter: blur(6px);
  }
  .modal-back.open { display: flex; }
  .modal {
    background: var(--paper); width: 100%; max-width: 540px;
    border-radius: var(--r-lg); border: 1px solid var(--line);
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.4);
    animation: pop .2s ease-out;
  }
  @keyframes pop { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal header {
    padding: 20px 24px;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 14px;
  }
  .modal header div { flex: 1; }
  .modal header h4 {
    margin: 0 0 4px; font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px;
  }
  .modal header p { margin: 0; font-size: 13px; color: var(--ink-3); line-height: 1.5; }
  .modal .x {
    background: none; border: none; cursor: pointer;
    color: var(--ink-3); font-size: 20px; line-height: 1;
    width: 28px; height: 28px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal .x:hover { background: var(--paper-2); color: var(--ink); }

  .link-box {
    margin: 0 24px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    display: flex; align-items: center; gap: 0;
    overflow: hidden;
  }
  .link-box .url {
    flex: 1; padding: 13px 16px;
    font: 400 13px/1.4 'Inter', sans-serif;
    color: var(--ink-2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .link-box button {
    appearance: none; border: none; background: var(--ink); color: var(--paper);
    padding: 13px 18px; cursor: pointer; font: 500 12.5px/1 'Inter', sans-serif;
    border-left: 1px solid var(--ink); height: 100%;
  }
  .link-box button:hover { background: var(--brand); }

  .share-grid {
    padding: 16px 24px 0;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .share-btn {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 16px 8px;
    border: 1px solid var(--line); border-radius: var(--r-md);
    background: var(--white); cursor: pointer; text-decoration: none;
    color: var(--ink); font: 500 12px/1 'Inter', sans-serif;
    transition: all .15s ease;
  }
  .share-btn:hover { border-color: var(--ink); transform: translateY(-1px); box-shadow: 0 4px 12px -4px rgba(0,0,0,0.1); }
  .share-btn .icon-wrap {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
  }
  .share-btn.wa .icon-wrap { background: #25D366; }
  .share-btn.tg .icon-wrap { background: #229ED9; }
  .share-btn.email .icon-wrap { background: var(--brand); }
  .share-btn.linkedin .icon-wrap { background: #0A66C2; }
  .share-btn .icon-wrap svg { width: 20px; height: 20px; }

  .modal footer {
    padding: 16px 24px 22px;
    margin-top: 12px;
    font-size: 12px; color: var(--ink-3); text-align: center;
  }

  /* Mobile */
  @media (max-width: 640px) {
    .page { margin: 0; border-radius: 0; border: none; }
    .masthead, .sec-head, .hero, .grid, .footer { padding-left: 22px; padding-right: 22px; }
    .pull { margin-left: 22px; margin-right: 22px; padding: 28px 24px; }
    .rule, .rule.tri { margin-left: 22px; margin-right: 22px; }
    .mast-title { font-size: 36px; }
    .hero h2 { font-size: 26px; }
    .article-row { grid-template-columns: 1fr; gap: 8px; padding: 20px 0; }
    .article-num { padding-top: 0; display: flex; gap: 10px; align-items: center; }
    .article-num .num { display: inline; margin: 0; }
    .article-arrow { display: none; }
    .footer-grid { grid-template-columns: 1fr; gap: 20px; }
    .toolbar { padding: 10px 14px; }
    .toolbar .meta { font-size: 11.5px; }

  <script type="text/babel" data-presets="env,react">
  const { useState, useMemo, useEffect, useRef } = React;
  const DATA = JSON.parse(document.getElementById('newsletter-data').textContent);

  const Icon = {
    link: <svg className="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
    share: <svg className="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
    arrow: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
    check: <svg className="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
    copy: <svg className="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
  };

  const GRID_STEP = 6;

  function ArchiveCard({ a }) {
    return (
      <a className="archive-card" href={a.url} target="_blank" rel="noopener">
        <div className="archive-image">
          <img src={a.image} alt="" loading="lazy" />
        </div>
        <div className="archive-body">
          <span className={`cat-tag ${a.categoryColor}`}>{a.category}</span>
          <h4>{a.title}</h4>
          <span className="archive-date">{a.date}</span>
        </div>
      </a>
    );
  }

  function ArchiveGridView({ items, limit, onExpand }) {
    const visible = items.slice(0, limit);
    const remaining = items.length - limit;
    return (
      <React.Fragment>
        <div className="archive-grid">
          {visible.map((a, i) => <ArchiveCard key={a.url || i} a={a} />)}
        </div>
        {remaining > 0 && (
          <div className="grid-expand">
            <button onClick={onExpand}>
              Mostra altri {Math.min(6, remaining)} articoli
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
          </div>
        )}
      </React.Fragment>
    );
  }

  function ArchiveHorizontalView({ items, trackRef }) {
    return (
      <div className="carousel-track" ref={trackRef}>
        {items.map((a, i) => <ArchiveCard key={a.url || i} a={a} />)}
      </div>
    );
  }

  function ArchiveCarousel({ items }) {
    const trackRef = useRef(null);
    const [canLeft, setCanLeft] = useState(false);
    const [canRight, setCanRight] = useState(true);
    const [mode, setMode] = useState('horizontal');
    const [gridLimit, setGridLimit] = useState(GRID_STEP);

    const update = () => {
      const el = trackRef.current;
      if (!el) return;
      setCanLeft(el.scrollLeft > 4);
      setCanRight(el.scrollLeft < el.scrollWidth - el.clientWidth - 4);
    };
    const scroll = (dir) => {
      const el = trackRef.current;
      if (!el) return;
      const step = (el.clientWidth * 0.8) * dir;
      el.scrollBy({ left: step, behavior: 'smooth' });
    };
    useEffect(() => {
      if (mode !== 'horizontal') return;
      update();
      const el = trackRef.current;
      if (!el) return;
      el.addEventListener('scroll', update, { passive: true });
      window.addEventListener('resize', update);
      return () => { el.removeEventListener('scroll', update); window.removeEventListener('resize', update); };
    }, [mode]);

    if (!items || items.length === 0) return null;

    return (
      <div className={`carousel mode-${mode}`}>
        <div className="carousel-head">
          <div>
            <div className="ck-eyebrow">Archivio</div>
            <h3>Tutti gli articoli recenti</h3>
          </div>
          <div className="carousel-controls">
            <div className="view-toggle" role="group" aria-label="Modalità di visualizzazione">
              <button onClick={() => setMode('horizontal')} className={mode === 'horizontal' ? 'active' : ''} aria-label="Vista orizzontale a scorrimento" aria-pressed={mode === 'horizontal'}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="6" width="18" height="4" rx="1"/><rect x="3" y="14" width="18" height="4" rx="1"/></svg>
              </button>
              <button onClick={() => setMode('grid')} className={mode === 'grid' ? 'active' : ''} aria-label="Vista a griglia" aria-pressed={mode === 'grid'}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              </button>
            </div>
            {mode === 'horizontal' && (
              <div className="carousel-nav">
                <button onClick={() => scroll(-1)} disabled={!canLeft} aria-label="Articoli precedenti">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                </button>
                <button onClick={() => scroll(1)} disabled={!canRight} aria-label="Articoli successivi">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
              </div>
            )}
          </div>
        </div>

        {mode === 'horizontal'
          ? <ArchiveHorizontalView items={items} trackRef={trackRef} />
          : <ArchiveGridView items={items} limit={gridLimit} onExpand={() => setGridLimit(g => g + GRID_STEP)} />}
      </div>
    );
  }

  function App() {

    useEffect(() => {

      if (!('IntersectionObserver' in window) || reduce) {
        els.forEach(el => el.classList.add('in'));
        return;
      }
      const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in');
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      els.forEach(el => io.observe(el));
      return () => io.disconnect();
    }, []);

          {/* Articles */}
          <div className="sec-head">
            <div>
              <div className="sec-kicker">Le altre letture</div>
              <h2 className="sec-title">Notizie della settimana</h2>
            </div>
            <div className="sec-count">{DATA.articles.length} articoli</div>
          </div>

          <div className="grid">
            {DATA.articles.map((a, i) => (
              <React.Fragment key={i}>
                {i > 0 && <div className="divider-red" aria-hidden="true"></div>}
                <a className={`article-card ${a.image ? '' : 'no-image'}`} href={a.url} target="_blank" rel="noopener" data-reveal="" style={{ '--reveal-delay': `${i * 70}ms` }}>
                  {a.image && (
                    <div className="article-image">
                      <img src={a.image} alt="" loading="lazy" />
                    </div>
                  )}
                  <div className="article-content">
                    <div className="article-meta-top">
                      <span className="num">N° {String(i + 1).padStart(2, '0')}</span>
                      <span className={`cat-tag ${a.categoryColor}`}>{a.category}</span>
                    </div>
                    <h3 className="article-title">{a.title}</h3>
                    <p className="article-summary">{a.summary}</p>
                    <div className="meta-line">
                      <span>{a.source}</span>
                      <span className="sep">·</span>
                      <span>{a.date}</span>
                      <span className="arrow-inline" aria-hidden="true">{Icon.arrow}</span>
                    </div>
                  </div>
                </a>
              </React.Fragment>
            ))}
          </div>

          {/* Pull quote */}
          <div className="pull" data-reveal="">
            <div className="pull-quote">
              <blockquote>«{DATA.pull.text}»</blockquote>
              <cite>— {DATA.pull.cite}</cite>
            </div>
            <div className="pull-logo" aria-hidden="true">
              <span className="ping"></span>
              <span className="ping"></span>
              <span className="ping"></span>
              <img src="assets/logo-fedaiisf.png" alt="Fedaiisf" />
            </div>
          </div>

          {/* Archive carousel */}
          <ArchiveCarousel items={DATA.archive} />

          {/* Footer */}
          <footer className="footer">
            <div className="footer-grid">
              <div>
                <h5>Fedaiisf</h5>
                <p>Federazione delle Associazioni italiane degli Informatori scientifici del farmaco e del parafarmaco. Promuoviamo la coesione tra gli associati e una visione condivisa dei temi della professione.</p>
              </div>
              <div>
                <h5>Sezioni</h5>
                <ul>
                  <li><a href="https://www.fedaiisf.it/category/notizie/">Notizie</a></li>
                  <li><a href="https://www.fedaiisf.it/category/news/primo-piano/">Primo piano</a></li>
                  <li><a href="https://www.fedaiisf.it/centro-documentazione/">Documentazione</a></li>
                  <li><a href="https://www.fedaiisf.it/category/delibere/">Delibere</a></li>
                </ul>
              </div>
              <div>
                <h5>Contatti</h5>
                <ul>
                  <li><a href="mailto:redazione@fedaiisf.it">Scrivi alla redazione</a></li>
                  <li><a href="https://www.fedaiisf.it/contatti/">Modulo contatti</a></li>
                  <li><a href="https://www.fedaiisf.it/iscrizione-associazioni-federate-fedaiisf/">Iscrizione</a></li>
                  <li><a href="https://www.fedaiisf.it/ricerca-sezioni-fedaiisf/">Territorio</a></li>
                </ul>
              </div>
              {DATA.comitato && DATA.comitato.groups && DATA.comitato.groups.length > 0 && (
                <div>
                  <h5>Comitato editoriale</h5>
                  {DATA.comitato.groups.map((g, i) => (
                    <div key={i} className="comitato-group">
                      <div className="c-label">{g.label}</div>
                      <ul className="comitato-list">
                        {g.names.map((n, j) => <li key={j}>{n}</li>)}
                      </ul>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="colophon">
              <div>© 2026 Fedaiisf · CF 91011770293</div>
              <div className="socials">
                <a href="https://www.facebook.com/fedaiisf.it/" target="_blank" rel="noopener">Facebook</a>
                <a href="https://www.linkedin.com/company/fedaiisf-isf/" target="_blank" rel="noopener">LinkedIn</a>
                <a href="https://www.instagram.com/fedaiisf2025/" target="_blank" rel="noopener">Instagram</a>
                <a href="https://www.youtube.com/channel/UC8hC_K7u8bSzwhybt6YgKIA" target="_blank" rel="noopener">YouTube</a>
              </div>
            </div>
          </footer>
        </div>

        {/* Toast */}
        <div className={`toast ${toast ? 'show' : ''}`}>
          {Icon.check}
          <span>{toast}</span>
        </div>

        {/* Share modal */}
        <div className={`modal-back ${shareOpen ? 'open' : ''}`} onClick={(e) => { if (e.target.className.includes('modal-back')) setShareOpen(false); }}>
          <div className="modal">
            <header>
              <div>
                <h4>Condividi questa newsletter</h4>
                <p>Invia il link a colleghi e iscritti. Si apre nel browser e include tutti i contenuti.</p>
              </div>
              <button className="x" onClick={() => setShareOpen(false)} aria-label="Chiudi">✕</button>
            </header>

            <div className="link-box">
              <div className="url">{DATA.publicUrl}</div>
              <button onClick={() => copyLink(DATA.publicUrl, 'Link copiato')}>Copia</button>
            </div>

            <div className="share-grid">
              <a className="share-btn wa" href={waUrl} target="_blank" rel="noopener">
                <span className="icon-wrap"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413"/></svg></span>
                WhatsApp
              </a>
              <a className="share-btn tg" href={tgUrl} target="_blank" rel="noopener">
                <span className="icon-wrap"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg></span>
                Telegram
              </a>
              <a className="share-btn linkedin" href={linkedinUrl} target="_blank" rel="noopener">
                <span className="icon-wrap"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.063 2.063 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></span>
                LinkedIn
              </a>
              <a className="share-btn email" href={mailUrl}>
                <span className="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
                Email
              </a>
            </div>

            <footer>
              Il link porta direttamente alla newsletter pubblicata online.
            </footer>
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
