<style>

    --brand: #0B4FA0;
    --brand-deep: #073973;
    --brand-soft: #E8EFF9;
    --accent-red: #B7202E;
    --accent-green: #1B7A4C;
    --ink: #1A1B1F;
    --ink-2: #3A3D44;
    --ink-3: #6B6F78;
    --line: #E4E4E0;
    --paper: #FBFAF6;
    --paper-2: #F4F1E9;
    --white: #FFFFFF;
    --r-sm: 10px; --r-md: 16px; --r-lg: 24px; --r-xl: 32px; --r-pill: 999px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: #EDE9DF;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Page */
  .page {
    max-width: 720px; margin: 32px auto;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    overflow: hidden;
    box-shadow: 0 24px 60px -30px rgba(11,79,160,0.18);
  }

  /* Toolbar */
  .toolbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(251,250,246,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; gap: 12px;
    font-size: 12.5px; color: var(--ink-3);
  }
  .toolbar .meta { display: flex; align-items: center; gap: 10px; font-weight: 500; }
  .toolbar .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--accent-green); display: inline-block; box-shadow: 0 0 0 3px rgba(27,122,76,0.15); }
  .toolbar .actions { display: flex; gap: 6px; align-items: center; }

  .btn {
    appearance: none; border: 1px solid var(--ink); background: var(--ink); color: var(--paper);
    padding: 9px 14px; border-radius: var(--r-pill);
    font: 500 12.5px/1 'Inter', sans-serif;
    cursor: pointer; transition: all .15s ease;
    display: inline-flex; align-items: center; gap: 7px; text-decoration: none;
  }
  .btn:hover { background: var(--brand); border-color: var(--brand); }
  .btn.ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn.ghost:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn .ico { width: 14px; height: 14px; }

  /* Masthead */
  .masthead { padding: 40px 48px 26px; }
  .masthead-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .mast-logo img { height: 40px; width: auto; display: block; }
  .mast-issue { text-align: right; font-size: 12px; color: var(--ink-3); line-height: 1.6; }
  .mast-issue strong { color: var(--ink); font-weight: 500; }

  .mast-title {
    margin: 32px 0 10px;
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 52px;
    line-height: 0.98;
    letter-spacing: -0.022em;
    color: var(--ink);
    text-wrap: balance;
  }
  .mast-title em { font-style: italic; color: var(--brand); font-weight: 300; }
  .mast-sub {
    margin-top: 14px;
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.55;
    max-width: 52ch;
  }

  .rule { height: 1px; background: var(--line); margin: 0 48px; }
  .rule.tri {
    height: 4px;
    background: linear-gradient(to right,
      var(--accent-green) 0 33.33%,
      var(--paper) 33.33% 66.66%,
      var(--accent-red) 66.66% 100%);
    margin: 0 48px;
  }

  /* Section */
  .sec-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 36px 48px 16px; gap: 16px;
  }
  .sec-kicker {
    font-size: 12px; color: var(--brand); font-weight: 500;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .sec-kicker::before {
    content: ""; width: 18px; height: 1px; background: var(--brand);
  }
  .sec-title {
    font-family: 'Fraunces', serif;
    font-size: 22px; line-height: 1.15;
    color: var(--ink); margin: 6px 0 0;
    font-weight: 500; letter-spacing: -0.01em;
  }
  .sec-count { font-size: 12px; color: var(--ink-3); }

  /* Hero */
  .hero { padding: 0 48px 36px; }
  .hero .label {
    display: inline-block;
    background: var(--brand-soft); color: var(--brand-deep);
    padding: 6px 12px; border-radius: var(--r-pill);
    font: 500 11.5px/1 'Inter', sans-serif;
    margin-bottom: 18px;
  }
  .hero h2 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 36px; line-height: 1.06;
    letter-spacing: -0.018em;
    margin: 0 0 16px; color: var(--ink);
    text-wrap: balance;
  }
  .hero h2 a {
    color: inherit; text-decoration: none;
    background-image: linear-gradient(var(--brand), var(--brand));
    background-size: 0 1px; background-repeat: no-repeat; background-position: 0 100%;
    transition: background-size .25s ease;
  }
  .hero h2 a:hover { background-size: 100% 1px; }
  .hero .deck {
    font-size: 15.5px; line-height: 1.65; color: var(--ink-2);
    margin: 0 0 18px; max-width: 58ch;
  }
  .hero .deck::first-letter {
    font-family: 'Fraunces', serif;
    font-size: 48px; line-height: 0.85; float: left;
    margin: 4px 8px 0 0; color: var(--brand); font-weight: 400;
  }
  .hero .meta-row {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 12.5px; color: var(--ink-3);
    margin-top: 12px;
  }
  .hero .meta-row .read {
    color: var(--brand); text-decoration: none; font-weight: 500;
    border-bottom: 1px solid var(--brand); padding-bottom: 2px;
  }
  .hero .meta-row .read:hover { color: var(--brand-deep); border-color: var(--brand-deep); }
  .hero .meta-row .sep { color: var(--line); }

  .hero .visual {
    margin-bottom: 26px;
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    aspect-ratio: 16/9;
    background: repeating-linear-gradient(45deg,
      rgba(11,79,160,0.06) 0 8px,
      rgba(11,79,160,0.02) 8px 16px);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero .visual img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero .visual::before {
    content: ""; position: absolute; inset: 14px;
    border: 1px dashed rgba(11,79,160,0.25);
    border-radius: calc(var(--r-lg) - 8px);
    pointer-events: none;
  }
  .hero .visual:has(img)::before { display: none; }
  .hero .visual .v-label {
    font-size: 12px; color: var(--brand);
    background: var(--paper);
    padding: 7px 14px;
    border: 1px solid rgba(11,79,160,0.25);
    border-radius: var(--r-pill);
    z-index: 1;
  }

  /* Articles list */
  .grid { padding: 0 48px 28px; }
  .article-row {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    gap: 20px; padding: 24px 0;
    border-top: 1px solid var(--line);
    align-items: baseline;
  }
  .article-row:last-child { border-bottom: 1px solid var(--line); }
  .article-num {
    font-size: 12px; color: var(--ink-3);
    padding-top: 4px; line-height: 1.4;
  }
  .article-num .num { font-weight: 500; color: var(--ink-2); display: block; margin-bottom: 6px; }
  .cat-tag {
    display: inline-block;
    padding: 3px 9px; border-radius: var(--r-pill);
    font-size: 11px; font-weight: 500;
    background: var(--brand-soft); color: var(--brand-deep);
  }
  .cat-tag.red { background: #FBE9EB; color: var(--accent-red); }
  .cat-tag.green { background: #E5F1EB; color: var(--accent-green); }
  .cat-tag.blue { background: var(--brand-soft); color: var(--brand-deep); }

  .article-body h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 19px; line-height: 1.22;
    letter-spacing: -0.01em;
    margin: 0 0 8px; color: var(--ink);
    text-wrap: balance;
  }
  .article-body h3 a {
    color: inherit; text-decoration: none;
    background-image: linear-gradient(var(--ink), var(--ink));
    background-size: 0 1px; background-repeat: no-repeat; background-position: 0 100%;
    transition: background-size .25s ease;
  }
  .article-body h3 a:hover { background-size: 100% 1px; }
  .article-body p {
    margin: 0; font-size: 14px; line-height: 1.6;
    color: var(--ink-2);
    text-wrap: pretty;
  }
  .article-body .meta-line {
    margin-top: 10px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    font-size: 12px; color: var(--ink-3);
  }
  .article-body .meta-line a {
    color: var(--brand); text-decoration: none; font-weight: 500;
  }
  .article-body .meta-line a:hover { text-decoration: underline; }
  .article-body .meta-line .sep { color: var(--line); }
  .article-arrow {
    align-self: center;
    width: 36px; height: 36px; border-radius: var(--r-pill);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-3); text-decoration: none;
    transition: all .15s ease; background: var(--paper);
  }
  .article-arrow:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); transform: translateX(2px); }

  /* Pull quote */
  .pull {
    margin: 14px 48px 36px;
    padding: 36px 40px;
    background: var(--brand);
    color: #fff;
    border-radius: var(--r-lg);
    position: relative;
    overflow: hidden;
  }
  .pull::after {
    content: ""; position: absolute;
    right: -80px; bottom: -80px;
    width: 240px; height: 240px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.08);
    pointer-events: none;
  }
  .pull::before {
    content: ""; position: absolute;
    right: -30px; bottom: -30px;
    width: 140px; height: 140px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.06);
    pointer-events: none;
  }
  .pull blockquote {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 24px; line-height: 1.28;
    margin: 0 0 14px; letter-spacing: -0.01em;
    text-wrap: balance;
    max-width: 24ch;
  }
  .pull cite {
    display: block; font-style: normal;
    font-size: 12.5px; opacity: 0.85;
  }

  /* Footer */
  .footer {
    padding: 36px 48px 32px;
    border-top: 1px solid var(--line);
    background: var(--paper-2);
  }
  .footer-grid {
    display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 28px;
    font-size: 13px; color: var(--ink-2); line-height: 1.6;
  }
  .footer-grid h5 {
    font-size: 12px; color: var(--ink-3);
    margin: 0 0 10px; font-weight: 500;
  }
  .footer-grid p { margin: 0; }
  .footer-grid ul { margin: 0; padding: 0; list-style: none; }
  .footer-grid li { margin-bottom: 5px; }
  .footer-grid a { color: var(--ink-2); text-decoration: none; border-bottom: 1px solid transparent; }
  .footer-grid a:hover { border-color: var(--ink-2); }

  .colophon {
    margin-top: 28px; padding-top: 18px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    font-size: 11.5px; color: var(--ink-3);

  .colophon .socials { display: flex; gap: 14px; }
  .colophon .socials a { color: var(--ink-3); text-decoration: none; }
  .colophon .socials a:hover { color: var(--ink); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--paper);
    padding: 13px 20px; border-radius: var(--r-pill);
    font: 500 13px/1 'Inter', sans-serif;
    box-shadow: 0 12px 30px -10px rgba(0,0,0,0.35);
    opacity: 0; pointer-events: none;
    transition: opacity .2s ease, transform .25s ease;
    z-index: 100;
    display: flex; align-items: center; gap: 9px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .check { width: 14px; height: 14px; color: #6FE2A2; }

  /* Modal */
  .modal-back {
    position: fixed; inset: 0;
    background: rgba(20,22,28,0.55);
    display: none; align-items: center; justify-content: center;

  .modal {

  .modal header h4 {

    background: none; border: none; cursor: pointer;
    color: var(--ink-3); font-size: 20px; line-height: 1;
    width: 28px; height: 28px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal .x:hover { background: var(--paper-2); color: var(--ink); }

  .link-box {
    margin: 0 24px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    display: flex; align-items: center; gap: 0;
    overflow: hidden;
  }
  .link-box .url {
    flex: 1; padding: 13px 16px;
    font: 400 13px/1.4 'Inter', sans-serif;
    color: var(--ink-2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .link-box button {
    appearance: none; border: none; background: var(--ink); color: var(--paper);
    padding: 13px 18px; cursor: pointer; font: 500 12.5px/1 'Inter', sans-serif;
    border-left: 1px solid var(--ink); height: 100%;
  }
  .link-box button:hover { background: var(--brand); }

  .share-grid {
    padding: 16px 24px 0;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .share-btn {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 16px 8px;
    border: 1px solid var(--line); border-radius: var(--r-md);
    background: var(--white); cursor: pointer; text-decoration: none;
    color: var(--ink); font: 500 12px/1 'Inter', sans-serif;
    transition: all .15s ease;
  }
  .share-btn:hover { border-color: var(--ink); transform: translateY(-1px); box-shadow: 0 4px 12px -4px rgba(0,0,0,0.1); }
  .share-btn .icon-wrap {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
  }
  .share-btn.wa .icon-wrap { background: #25D366; }
  .share-btn.tg .icon-wrap { background: #229ED9; }
  .share-btn.email .icon-wrap { background: var(--brand); }
  .share-btn.linkedin .icon-wrap { background: #0A66C2; }
  .share-btn .icon-wrap svg { width: 20px; height: 20px; }

  .modal footer {
    padding: 16px 24px 22px;
    margin-top: 12px;
    font-size: 12px; color: var(--ink-3); text-align: center;
  }

  /* Mobile */
  @media (max-width: 640px) {
    .page { margin: 0; border-radius: 0; border: none; }
    .masthead, .sec-head, .hero, .grid, .footer { padding-left: 22px; padding-right: 22px; }
    .pull { margin-left: 22px; margin-right: 22px; padding: 28px 24px; }
    .rule, .rule.tri { margin-left: 22px; margin-right: 22px; }
    .mast-title { font-size: 36px; }
    .hero h2 { font-size: 26px; }
    .article-row { grid-template-columns: 1fr; gap: 8px; padding: 20px 0; }
    .article-num { padding-top: 0; display: flex; gap: 10px; align-items: center; }
    .article-num .num { display: inline; margin: 0; }
    .article-arrow { display: none; }
    .footer-grid { grid-template-columns: 1fr; gap: 20px; }
    .toolbar { padding: 10px 14px; }
    .toolbar .meta { font-size: 11.5px; }
    .toolbar .actions .btn span:not(.ico-text) { display: none; }
    .share-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Print */
  @media print {
    body { background: white; }
    .toolbar, .modal-back, .toast { display: none !important; }
    .page { margin: 0; box-shadow: none; border: none; max-width: none; border-radius: 0; }
    a { color: var(--ink) !important; }
  }
</style>
